
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ashley Nicole ✝️💜</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1 onclick="toggleSecret()">Ashley Nicole ✝️💜</h1>

<p id="secret" class="hidden">
God is walking with you through everything.
You are deeply loved.
</p>

<!-- PHOTO -->
<div class="card">
  <h2>💜 Always Protected ✝️</h2>
  <img src="family.jpg" class="main-photo">
  <p>Covered in love. Never alone.</p>
</div>

<!-- MESSAGE -->
<div class="card">
  <h2>💜 A Message</h2>
  <div id="letter"></div>
</div>

<!-- MUSIC -->
<div class="card">
  <h2>🎵 Peace Music</h2>
  <button onclick="playMusic()">Play</button>
</div>

<!-- VERSE -->
<div class="card">
  <h2>✝️ Scripture</h2>
  <p id="verse"></p>
  <button onclick="newVerse()">New Verse</button>
</div>

<!-- PRAYER -->
<div class="card">
  <h2>🙏 Prayer</h2>
  <button onclick="pray()">Pray for Me</button>
  <p id="prayer"></p>
</div>

<p class="footer">stay strong… God’s got you ✝️💜</p>

</div>

<script src="app.js"></script>

</body>
</html>
